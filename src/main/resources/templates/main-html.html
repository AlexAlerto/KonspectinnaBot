<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Styled Grid</title>
        <style>
            .row {
                --bs-gutter-x: 1.5rem;
                --bs-gutter-y: 0;
                display: flex;
                flex-wrap: wrap;
                margin-top: calc(-1 * var(--bs-gutter-y));
                margin-right: calc(-.5 * var(--bs-gutter-x));
                margin-left: calc(-.5 * var(--bs-gutter-x));
            }
            .text-center {
                text-align: center !important;
            }
            .mb-3 {
                margin-bottom: 1rem !important;
            }
            *, ::after, ::before {
                box-sizing: border-box;
            }
            .col-4 {
                flex: 0 0 auto;
                width: 30%;
                height: 30px;
            }
            .themed-grid-col {
                padding-top: .75rem;
                padding-bottom: .75rem;
                background-color: rgba(112.520718, 44.062154, 249.437846, .15);
                border: 1px solid rgba(112.520718, 44.062154, 249.437846, .3);
            }
            body {
                margin: 0;
                -webkit-text-size-adjust: 100%;
                background-color: black;
                -webkit-tap-highlight-color: transparent;
                color: aliceblue;
            }
        </style>
    </head>


        <body>
        <div th:each="el : ${files}" class="row mb-3 text-center">
            <div th:text="${el.id} " class="col-4 themed-grid-col"></div>
            <div th:text="${el.path} " class="col-4 themed-grid-col"></div>
        </div>
    </body>
</html>
